<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Loading - Demo QR Codes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            margin: 0;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #4ade80;
            margin-bottom: 10px;
        }
        p.subtitle {
            color: #94a3b8;
            margin-bottom: 40px;
            text-align: center;
            max-width: 600px;
            line-height: 1.6;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
            width: 100%;
            max-width: 1000px;
        }
        .card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #4ade80;
        }
        .qrcode {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        .label {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 8px;
            color: #e2e8f0;
        }
        .hash {
            font-family: monospace;
            font-size: 0.75rem;
            color: #64748b;
            word-break: break-all;
            text-align: center;
        }
    </style>
</head>
<body>

    <h1>Interactive Scanner Demo</h1>
    <p class="subtitle">
        Scan these QR codes using the <b>Smart Loading Assistant</b> mobile app.<br>
        These codes contain valid 64-character cryptographic tracking hashes required by the system.
    </p>

    <div class="grid" id="qr-grid"></div>

    <script>
        // Generate 6 valid 64-character hashes for the demo
        const demoItems = [
            { label: "Pallet 1 - Heavy Machinery", hash: "9b3c4f8d2e1a7b6c5d4e3f2a1b0c9d8e7f6a5b4c3d2e1f0a9b8c7d6e5f4a3b2" },
            { label: "Pallet 2 - Fragile Electronics", hash: "1a2b3c4d5e6f7a8b9c0d1e2f3a4b5c6d7e8f9a0b1c2d3e4f5a6b7c8d9e0f1a2" },
            { label: "Pallet 3 - Standard Cargo", hash: "f1e2d3c4b5a69f8e7d6c5b4a39f2e1d0c9b8a7f6e5d4c3b2a19f8e7d6c5b4a3" },
            { label: "Pallet 4 - Liquid Drums", hash: "4a5b6c7d8e9f0a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5" },
            { label: "Pallet 5 - Hazardous Material", hash: "d4c3b2a1f0e9d8c7b6a5f4e3d2c1b0a9f8e7d6c5b4a3f2e1d0c9b8a7f6e5d4c" },
            { label: "Pallet 6 - Oversized Load", hash: "2f3e4d5c6b7a89f0e1d2c3b4a5f6e7d8c9b0a1f2e3d4c5b6a7f8e9d0c1b2a3f" }
        ];

        const grid = document.getElementById('qr-grid');

        demoItems.forEach(item => {
            // Create card container
            const card = document.createElement('div');
            card.className = 'card';

            // Create QR container
            const qrContainer = document.createElement('div');
            qrContainer.className = 'qrcode';

            // Create labels
            const title = document.createElement('div');
            title.className = 'label';
            title.innerText = item.label;

            const hash = document.createElement('div');
            hash.className = 'hash';
            hash.innerText = item.hash;

            // Generate QR Code
            new QRCode(qrContainer, {
                text: item.hash,
                width: 200,
                height: 200,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L
            });

            // Assemble
            card.appendChild(qrContainer);
            card.appendChild(title);
            card.appendChild(hash);
            grid.appendChild(card);
        });
    </script>
</body>
</html>
